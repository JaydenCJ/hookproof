<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="420" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">hookproof — why did signature verification fail?</text>

  <text x="24" y="62" fill="#7ee787">$ hookproof verify --secret whsec_test --payload body.json --now 1700000012 \</text>
  <text x="24" y="80" fill="#7ee787">    --header "Stripe-Signature: t=1700000000,v1=8ad3ccd6627d4c5ccaca…c36c505"</text>

  <text x="24" y="110" fill="#ff7b72" font-weight="bold">FAIL  stripe — signature did not verify</text>
  <text x="24" y="132" fill="#c9d1d9">  payload    66 bytes</text>
  <text x="24" y="152" fill="#c9d1d9">  canonical  "1700000000.{\n  \"id\": \"evt_1\",\n  \"object\": \"event\"…" (77 bytes)</text>
  <text x="24" y="172" fill="#c9d1d9">  timestamp  1700000000 · skew -12s of 300s tolerance · ok</text>
  <text x="24" y="192" fill="#c9d1d9">  expected   ad0026fc0dcede6eeeb5…1211a85d0d6081ac654 (sha256 · hex)</text>
  <text x="24" y="212" fill="#c9d1d9">  provided   8ad3ccd6627d4c5ccaca…4501614c0a82c36c505</text>

  <text x="24" y="244" fill="#c9d1d9">  findings (1)</text>
  <text x="24" y="266"><tspan fill="#ff7b72">  x payload-reserialized</tspan><tspan fill="#c9d1d9"> — verifies against the compact re-serialization</tspan></text>
  <text x="24" y="284" fill="#c9d1d9">    of your JSON — the body was parsed and re-serialized before verification</text>
  <text x="24" y="304"><tspan fill="#d2a8ff">      fix:</tspan><tspan fill="#c9d1d9"> verify against the RAW request bytes (e.g. express.raw() / request.body</tspan></text>
  <text x="24" y="322" fill="#c9d1d9">      before JSON parsing), never JSON.stringify(req.body)</text>

  <text x="24" y="356" fill="#8b949e">← the canonical string, the skew and the root cause — not a bare boolean</text>

  <text x="24" y="392"><tspan fill="#7ee787">$ hookproof sign --provider svix --secret whsec_a2V5… --timestamp 1700000000</tspan><tspan fill="#8b949e">  # mint test headers</tspan></text>
</svg>
